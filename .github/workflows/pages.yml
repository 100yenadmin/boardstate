name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - name: Build the standalone demo
        run: pnpm --filter boardstate-example-standalone build
        env:
          BASE_PATH: /boardstate/

      - name: Build the reference app
        run: pnpm --filter boardstate-example-app build
        env:
          BASE_PATH: /boardstate/app/

      # The standalone demo is the site root; the app nests under /app/.
      - name: Assemble the Pages site
        run: |
          mkdir -p site
          cp -r examples/standalone/dist/* site/
          cp -r examples/app/dist site/app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
