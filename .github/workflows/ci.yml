name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      # Build first: packages resolve each other via their published `dist`
      # entrypoints (including subpaths like `@boardstate/server/node`), so the
      # `.d.ts` must exist before typecheck runs.
      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm lint
