<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boardstate — plug in your AI, watch it build your dashboard</title>
    <meta
      name="description"
      content="Plug in a provider (GLM, Anthropic, OpenAI, Ollama, or any OpenAI-compatible endpoint) and watch the AI compose a live dashboard — running entirely in your browser, no server."
    />
    <meta
      property="og:title"
      content="Boardstate — plug in your AI, watch it build your dashboard"
    />
    <meta
      property="og:description"
      content="Bring your own API key and watch an AI build a dashboard live, over the same control plane a human uses."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://100yenadmin.github.io/boardstate/app/" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%236c5bfa'/%3E%3Crect x='6' y='6' width='12' height='9' rx='2' fill='white'/%3E%3Crect x='20' y='6' width='6' height='20' rx='2' fill='white' opacity='.75'/%3E%3Crect x='6' y='17' width='12' height='9' rx='2' fill='white' opacity='.55'/%3E%3C/svg%3E"
    />
    <style>
      /* Fallback tokens so the page is legible before a theme stylesheet loads.
         A theme file (or the built-in Graphite) redefines these on :root. */
      :root {
        --bs-bg: #0b0b0f;
        --bs-card: #131318;
        --bs-border: #23232b;
        --bs-border-strong: #30303a;
        --bs-text: #ededf2;
        --bs-text-strong: #fff;
        --bs-text-muted: #9a9aa6;
        --bs-accent: #7c6cff;
        --bs-accent-foreground: #fff;
        --bs-bg-hover: rgba(255, 255, 255, 0.04);
        --bs-radius-md: 9px;
        --bs-font-sans: -apple-system, "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: var(--bs-font-sans);
        color: var(--bs-text);
        background: var(--bs-bg);
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.6rem 1rem;
        padding: 0.7rem 1.25rem;
        border-bottom: 1px solid var(--bs-border);
        background: var(--bs-card);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-right: auto;
        min-width: 0;
      }
      .brand svg {
        flex: none;
      }
      .brand h1 {
        font-size: 0.95rem;
        margin: 0;
        font-weight: 650;
        color: var(--bs-text-strong);
        letter-spacing: -0.01em;
        white-space: nowrap;
      }
      .brand p {
        margin: 0;
        color: var(--bs-text-muted);
        font-size: 0.78rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .controls {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.45rem;
      }
      .controls label {
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--bs-text-muted);
        margin-left: 0.35rem;
      }
      select,
      .ghost-btn {
        appearance: none;
        border: 1px solid var(--bs-border-strong);
        border-radius: 8px;
        background: var(--bs-card);
        color: var(--bs-text);
        font-family: inherit;
        font-size: 0.8rem;
        font-weight: 500;
        padding: 0.38rem 0.65rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      select:hover,
      .ghost-btn:hover {
        border-color: var(--bs-accent);
        background: var(--bs-bg-hover);
      }
      /* RTL languages: let each English/Arabic run keep its own direction. */
      [dir="rtl"] header p {
        unicode-bidi: plaintext;
      }
      @media (max-width: 760px) {
        .brand p {
          display: none;
        }
        body {
          overflow: auto;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="7" fill="#6c5bfa" />
          <rect x="6" y="6" width="12" height="9" rx="2" fill="#fff" />
          <rect x="20" y="6" width="6" height="20" rx="2" fill="#fff" opacity=".75" />
          <rect x="6" y="17" width="12" height="9" rx="2" fill="#fff" opacity=".55" />
        </svg>
        <div>
          <h1>Boardstate</h1>
          <p>Plug in your AI. Watch it build.</p>
        </div>
      </div>
      <div class="controls">
        <label for="board">Board</label>
        <select id="board" title="Swap the whole workspace document (a template)">
          <option value="agent-hq">Agent HQ</option>
          <option value="showcase">Showcase — all 15 builtins</option>
          <option value="smallbiz">Small business</option>
          <option value="maintainer">OSS maintainer</option>
        </select>
        <span id="provider-pill" class="pill" data-state="mock" title="Provider status"></span>
        <span id="cost-meter" hidden title="Session token usage & estimated cost"></span>
        <label for="lang">Lang</label>
        <select id="lang" title="UI language (partial translations; English fallback)">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="fa">فارسی</option>
          <option value="fr">Français</option>
          <option value="hi">हिन्दी</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="it">Italiano</option>
          <option value="ja-JP">日本語</option>
          <option value="ko">한국어</option>
          <option value="nl">Nederlands</option>
          <option value="pl">Polski</option>
          <option value="pt-BR">Português (BR)</option>
          <option value="ru">Русский</option>
          <option value="th">ไทย</option>
          <option value="tr">Türkçe</option>
          <option value="uk">Українська</option>
          <option value="vi">Tiếng Việt</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
        </select>
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="graphite">Graphite</option>
          <option value="vibrancy">Vibrancy</option>
          <option value="aurora">Aurora</option>
        </select>
        <button id="mode" class="ghost-btn" title="Toggle light / dark">🌙 Dark</button>
        <button id="provider-gear" class="ghost-btn" title="Change provider / API key">
          ⚙️ Provider
        </button>
        <a
          class="ghost-btn"
          href="https://github.com/100yenadmin/boardstate"
          target="_blank"
          rel="noopener"
          title="Source, docs, and templates on GitHub"
        >
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            />
          </svg>
          GitHub
        </a>
      </div>
    </header>
    <div id="app-shell">
      <div id="board-area"></div>
      <div
        id="dock-divider"
        role="separator"
        aria-orientation="vertical"
        title="Drag to resize the chat"
      ></div>
      <div id="chat-dock">
        <div id="chat-dock-chrome">
          <div id="prompt-chips"></div>
          <div id="cors-card" hidden></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
