<!doctype html>
<!--
  twenty48 — a compact 2048 tile game, and the one starter that exercises the
  `state:persist` capability end-to-end. On boot it asks the parent for its
  saved blob (dashboard:getState) and restores the best score plus any
  in-progress board; after each effective move it writes a tiny blob back
  (dashboard:setState). Both messages are gated by the "state:persist"
  capability in widget.json — without it the parent replies capability_denied
  and the game just runs in-memory with best = 0. No bindings, no network of
  any kind: everything below is self-contained.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Twenty48</title>
    <style>
      :root {
        color-scheme: dark;
        /* Theme tokens: default to system Canvas/CanvasText, overridden by the
           parent's dashboard:theme reply (--bg/--card/--text/--accent/--border).
           The derived tokens read from --text so the pushed theme drives them. */
        --bg: Canvas;
        --card: color-mix(in srgb, var(--text) 8%, Canvas);
        --text: CanvasText;
        --accent: #edc22e;
        --border: color-mix(in srgb, var(--text) 22%, transparent);
        --cell: color-mix(in srgb, var(--text) 14%, transparent);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        padding: 8px;
        font-family: var(--font-sans, system-ui, -apple-system, sans-serif);
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 6px;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      header {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }
      h1 {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
        flex: 1;
      }
      .score {
        text-align: center;
        min-width: 52px;
        padding: 3px 8px;
        border-radius: 6px;
        background: var(--card);
        border: 1px solid var(--border);
        line-height: 1.1;
      }
      .score b {
        display: block;
        font-size: 0.55rem;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        opacity: 0.7;
        font-weight: 600;
      }
      .score span {
        font-size: 0.95rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      button {
        font: inherit;
        font-size: 0.8rem;
        padding: 5px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--card);
        color: inherit;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--accent);
      }
      /* The board is square and scales to the smaller of the remaining width /
         height so it always fits the widget cell regardless of aspect ratio. */
      #stage {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #board {
        position: relative;
        width: min(100%, calc(100cqh - 0px));
        aspect-ratio: 1 / 1;
        max-width: 100%;
        max-height: 100%;
        padding: 2.6%;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--border);
      }
      #stage {
        container-type: size;
      }
      .grid {
        position: absolute;
        inset: 2.6%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 3.2%;
      }
      .grid .bg {
        border-radius: 6px;
        background: var(--cell);
      }
      .tiles {
        position: absolute;
        inset: 2.6%;
      }
      .tile {
        position: absolute;
        /* Must match the bg grid: 4 tracks + 3 gaps of 3.2% → track = 22.6%.
           Positioned via left/top (container-relative %) — translate % would
           resolve against the TILE's own size and bunch everything up. */
        width: 22.6%;
        height: 22.6%;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        font-size: 6cqmin;
        background: #eee4da;
        color: #776e65;
        transition:
          left 90ms ease,
          top 90ms ease,
          background 90ms ease;
        will-change: left, top;
      }
      .tile.pop {
        animation: pop 120ms ease;
      }
      @keyframes pop {
        0% {
          transform: scale(0.1);
        }
        100% {
          transform: scale(1);
        }
      }
      .tile.merged {
        animation: merged 120ms ease;
      }
      @keyframes merged {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.16);
        }
        100% {
          transform: scale(1);
        }
      }
      /* Overlay for game-over / win — sits above the tiles. */
      #overlay {
        position: absolute;
        inset: 0;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: color-mix(in srgb, var(--bg) 78%, transparent);
        text-align: center;
      }
      #overlay.show {
        display: flex;
      }
      #overlay p {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }
      footer {
        flex: 0 0 auto;
        font-size: 0.62rem;
        opacity: 0.6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Twenty48</h1>
      <div class="score"><b>Score</b><span id="score">0</span></div>
      <div class="score"><b>Best</b><span id="best">0</span></div>
      <button id="new" type="button">New game</button>
    </header>
    <div id="stage">
      <div id="board">
        <div class="grid" id="grid"></div>
        <div class="tiles" id="tiles"></div>
        <div id="overlay">
          <p id="overlay-text"></p>
          <button id="overlay-btn" type="button">New game</button>
        </div>
      </div>
    </div>
    <footer>sandboxed · no network · state:persist</footer>

    <script>
      "use strict";

      // ---- postMessage bridge helpers (v1 envelope, see packages/host/src/bridge.ts) ----
      var reqSeq = 0;
      function nextReqId() {
        return "t48-" + Date.now().toString(36) + "-" + reqSeq++;
      }
      function post(type, extra) {
        window.parent.postMessage(Object.assign({ v: 1, type: type }, extra || {}), "*");
      }

      // ---- game state ----
      var SIZE = 4;
      var board = emptyBoard(); // 4x4 of numbers (0 = empty)
      var score = 0;
      var best = 0;
      var won = false; // 2048 reached and banner acknowledged (keep playing)
      var over = false;
      var tileEls = {}; // id -> element, so tiles animate (slide) between moves
      var nextTileId = 1;

      function emptyBoard() {
        var b = [];
        for (var r = 0; r < SIZE; r++) b.push([0, 0, 0, 0]);
        return b;
      }

      // Each cell can hold {value, id} once rendered; we track ids on a parallel
      // grid so a moved tile keeps its DOM node and CSS-transitions to its new spot.
      var ids = emptyBoard();

      function spawnTile() {
        var free = [];
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++) if (board[r][c] === 0) free.push([r, c]);
        if (!free.length) return null;
        var pick = free[(Math.random() * free.length) | 0];
        board[pick[0]][pick[1]] = Math.random() < 0.9 ? 2 : 4;
        ids[pick[0]][pick[1]] = nextTileId++;
        return pick;
      }

      // ---- move logic (correct 2048 merge: at most one merge per tile per move) ----
      // Collapse a single line toward index 0. Returns {line, gained, moved}.
      function collapse(values) {
        var filtered = values.filter(function (v) {
          return v !== 0;
        });
        var out = [];
        var gained = 0;
        for (var i = 0; i < filtered.length; i++) {
          if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
            var sum = filtered[i] * 2;
            out.push(sum);
            gained += sum;
            i++; // consume the partner so it can't merge again this move
          } else {
            out.push(filtered[i]);
          }
        }
        while (out.length < SIZE) out.push(0);
        var moved = false;
        for (var j = 0; j < SIZE; j++)
          if (out[j] !== values[j]) {
            moved = true;
            break;
          }
        return { line: out, gained: gained, moved: moved };
      }

      // Read a line from the board for a direction, apply collapse, write back.
      // dir: 0=left, 1=right, 2=up, 3=down. Returns {moved, gained, reached2048}.
      function move(dir) {
        var moved = false;
        var gained = 0;
        var reached = false;
        for (var k = 0; k < SIZE; k++) {
          var coords = lineCoords(dir, k);
          var vals = coords.map(function (rc) {
            return board[rc[0]][rc[1]];
          });
          var res = collapse(vals);
          if (res.moved) moved = true;
          gained += res.gained;
          for (var i = 0; i < SIZE; i++) {
            board[coords[i][0]][coords[i][1]] = res.line[i];
            if (res.line[i] >= 2048) reached = true;
          }
        }
        return { moved: moved, gained: gained, reached2048: reached };
      }

      // The 4 board coordinates of "line" k, ordered from the direction's leading
      // edge (index 0 = where tiles pile up). left/right walk columns; up/down rows.
      function lineCoords(dir, k) {
        var out = [];
        for (var i = 0; i < SIZE; i++) {
          if (dir === 0)
            out.push([k, i]); // left: row k, cols 0..3
          else if (dir === 1)
            out.push([k, SIZE - 1 - i]); // right
          else if (dir === 2)
            out.push([i, k]); // up: col k, rows 0..3
          else out.push([SIZE - 1 - i, k]); // down
        }
        return out;
      }

      function anyMovesLeft() {
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++) {
            if (board[r][c] === 0) return true;
            if (c + 1 < SIZE && board[r][c] === board[r][c + 1]) return true;
            if (r + 1 < SIZE && board[r][c] === board[r + 1][c]) return true;
          }
        return false;
      }

      function doMove(dir) {
        if (over) return;
        // move() rewrites the board in place; ids no longer map to the merged
        // layout, so we rebuild ids fresh from the collapsed board for rendering.
        var before = board.map(function (row) {
          return row.slice();
        });
        var res = move(dir);
        if (!res.moved) {
          board = before; // no effective move — restore and ignore
          return;
        }
        score += res.gained;
        if (score > best) {
          best = score;
          saveState(true); // new best is worth an immediate write
        }
        reindexIds();
        var spawned = spawnTile();
        render(spawned);
        if (res.reached2048 && !won) {
          won = true;
          showOverlay("You made 2048! Keep going →");
        } else if (!anyMovesLeft()) {
          over = true;
          showOverlay("Game over — score " + score);
        }
        saveState(false); // debounced write of the new board/score
      }

      // Assign a fresh id to every occupied cell after a collapse. We intentionally
      // do NOT try to preserve slide-source identity (that needs per-tile origin
      // tracking); tiles cross-fade/pop into place, which reads cleanly at this size.
      function reindexIds() {
        var fresh = emptyBoard();
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++) if (board[r][c] !== 0) fresh[r][c] = nextTileId++;
        ids = fresh;
      }

      // ---- rendering ----
      // Fixed hue scale that keeps readable text contrast on both light and dark.
      var COLORS = {
        2: ["#eee4da", "#776e65"],
        4: ["#ede0c8", "#776e65"],
        8: ["#f2b179", "#fff8f0"],
        16: ["#f59563", "#fff8f0"],
        32: ["#f67c5f", "#fff8f0"],
        64: ["#f65e3b", "#fff8f0"],
        128: ["#edcf72", "#fff8f0"],
        256: ["#edcc61", "#fff8f0"],
        512: ["#edc850", "#fff8f0"],
        1024: ["#edc53f", "#fff8f0"],
        2048: ["#edc22e", "#fff8f0"],
      };
      function colorFor(v) {
        return COLORS[v] || ["#3c3a32", "#fff8f0"];
      }
      function applyPos(el, r, c) {
        // Container-relative placement matching the bg grid: 22.6% track + 3.2% gap.
        var step = 22.6 + 3.2;
        el.style.left = c * step + "%";
        el.style.top = r * step + "%";
      }

      var tilesEl = document.getElementById("tiles");
      function render(spawned) {
        var seen = {};
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++) {
            var v = board[r][c];
            if (v === 0) continue;
            var id = ids[r][c];
            seen[id] = true;
            var el = tileEls[id];
            if (!el) {
              el = document.createElement("div");
              el.className = "tile";
              tilesEl.appendChild(el);
              tileEls[id] = el;
            }
            applyPos(el, r, c);
            el.textContent = v;
            var col = colorFor(v);
            el.style.background = col[0];
            el.style.color = col[1];
            el.classList.remove("pop", "merged");
            // force reflow so re-adding the animation class restarts it
            void el.offsetWidth;
            if (spawned && spawned[0] === r && spawned[1] === c) el.classList.add("pop");
          }
        // drop tiles no longer present
        for (var key in tileEls) {
          if (!seen[key]) {
            tilesEl.removeChild(tileEls[key]);
            delete tileEls[key];
          }
        }
        document.getElementById("score").textContent = score;
        document.getElementById("best").textContent = best;
      }

      function buildGrid() {
        var grid = document.getElementById("grid");
        for (var i = 0; i < SIZE * SIZE; i++) {
          var bg = document.createElement("div");
          bg.className = "bg";
          grid.appendChild(bg);
        }
      }

      var overlay = document.getElementById("overlay");
      function showOverlay(text) {
        document.getElementById("overlay-text").textContent = text;
        overlay.classList.add("show");
      }
      function hideOverlay() {
        overlay.classList.remove("show");
      }

      function newGame() {
        board = emptyBoard();
        ids = emptyBoard();
        score = 0;
        won = false;
        over = false;
        for (var key in tileEls) {
          tilesEl.removeChild(tileEls[key]);
          delete tileEls[key];
        }
        spawnTile();
        spawnTile();
        hideOverlay();
        render(null);
        saveState(false);
      }

      // ---- state:persist (dashboard:getState / dashboard:setState) ----
      var saveTimer = null;
      var haveState = false; // did the parent ever answer? (else run in-memory)
      function serialize() {
        // Tiny blob (<1KB): best + the current board + score, ids rebuilt on load.
        return { best: best, score: score, board: board, won: won, over: over };
      }
      function saveState(immediate) {
        if (saveTimer) {
          clearTimeout(saveTimer);
          saveTimer = null;
        }
        var doSave = function () {
          saveTimer = null;
          post("dashboard:setState", { requestId: nextReqId(), state: serialize() });
        };
        if (immediate) doSave();
        else saveTimer = setTimeout(doSave, 500);
      }

      function restore(state) {
        haveState = true;
        if (!state || typeof state !== "object") return false;
        if (typeof state.best === "number") best = state.best;
        var b = state.board;
        var ok =
          Array.isArray(b) &&
          b.length === SIZE &&
          b.every(function (row) {
            return Array.isArray(row) && row.length === SIZE;
          });
        if (ok) {
          board = b.map(function (row) {
            return row.slice();
          });
          score = typeof state.score === "number" ? state.score : 0;
          won = !!state.won;
          over = !!state.over;
          reindexIds();
          render(null);
          if (over) showOverlay("Game over — score " + score);
          document.getElementById("best").textContent = best;
          return true;
        }
        document.getElementById("best").textContent = best;
        return false;
      }

      // ---- theme ----
      // Relative luminance (0..1) of a #rgb / #rrggbb color; null for anything non-hex.
      function hexLuminance(value) {
        if (typeof value !== "string" || value.charAt(0) !== "#") return null;
        var hex = value.slice(1);
        if (hex.length === 3) hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
        if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
        var r = parseInt(hex.slice(0, 2), 16);
        var g = parseInt(hex.slice(2, 4), 16);
        var b = parseInt(hex.slice(4, 6), 16);
        return (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
      }

      function applyTheme(tokens) {
        if (!tokens) return;
        var root = document.documentElement.style;
        ["--bg", "--card", "--text", "--accent", "--border"].forEach(function (k) {
          if (tokens[k]) root.setProperty(k, tokens[k]);
        });
        // Follow the pushed background's luminance so native UI (scrollbars, form
        // controls) picks the matching scheme; skip when --bg isn't a hex color.
        var lum = hexLuminance(tokens["--bg"]);
        if (lum !== null) root.colorScheme = lum < 0.5 ? "dark" : "light";
      }

      // ---- inbound messages (ignore anything without the v:1 envelope) ----
      var stateReqId = nextReqId();
      window.addEventListener("message", function (event) {
        var msg = event.data;
        if (!msg || msg.v !== 1) return;
        if (msg.type === "dashboard:theme") {
          applyTheme(msg.tokens);
        } else if (msg.type === "dashboard:state") {
          // reply to our getState (or the echo of a setState). Only the first,
          // matching our boot getState, seeds the board.
          if (!haveState && msg.requestId === stateReqId) {
            if (!restore(msg.state)) {
              if (isBoardEmpty()) newGame();
            }
          }
        } else if (msg.type === "dashboard:error") {
          // capability_denied (state:persist off) or similar — fall back to
          // in-memory play so the game still works when opened standalone.
          if (!haveState) {
            haveState = true;
            if (isBoardEmpty()) newGame();
          }
        }
      });

      function isBoardEmpty() {
        for (var r = 0; r < SIZE; r++)
          for (var c = 0; c < SIZE; c++) if (board[r][c] !== 0) return false;
        return true;
      }

      // ---- input: arrow keys + WASD ----
      var KEYS = {
        ArrowLeft: 0,
        ArrowRight: 1,
        ArrowUp: 2,
        ArrowDown: 3,
        a: 0,
        d: 1,
        w: 2,
        s: 3,
        A: 0,
        D: 1,
        W: 2,
        S: 3,
      };
      window.addEventListener("keydown", function (e) {
        if (Object.prototype.hasOwnProperty.call(KEYS, e.key)) {
          e.preventDefault();
          doMove(KEYS[e.key]);
        }
      });

      // ---- input: touch swipe ----
      var touchStart = null;
      var boardEl = document.getElementById("board");
      boardEl.addEventListener(
        "touchstart",
        function (e) {
          var t = e.changedTouches[0];
          touchStart = { x: t.clientX, y: t.clientY };
        },
        { passive: true },
      );
      boardEl.addEventListener(
        "touchend",
        function (e) {
          if (!touchStart) return;
          var t = e.changedTouches[0];
          var dx = t.clientX - touchStart.x;
          var dy = t.clientY - touchStart.y;
          touchStart = null;
          var ax = Math.abs(dx);
          var ay = Math.abs(dy);
          if (Math.max(ax, ay) < 24) return; // too small to be a swipe
          if (ax > ay) doMove(dx > 0 ? 1 : 0);
          else doMove(dy > 0 ? 3 : 2);
        },
        { passive: true },
      );

      // ---- wire up + boot ----
      document.getElementById("new").onclick = newGame;
      document.getElementById("overlay-btn").onclick = newGame;
      buildGrid();

      // Announce, request theme, and ask for our persisted blob. If no host is
      // listening (standalone open) nothing replies — start a game after a beat.
      post("dashboard:ready");
      post("dashboard:getTheme", { requestId: nextReqId() });
      post("dashboard:getState", { requestId: stateReqId });
      setTimeout(function () {
        if (!haveState && isBoardEmpty()) newGame();
      }, 400);
    </script>
  </body>
</html>
